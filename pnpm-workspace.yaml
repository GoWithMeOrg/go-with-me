packages:
  - packages/*

allowBuilds:
  '@apollo/protobufjs': true
  '@nestjs/core': true
  core-js-pure: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@apollo/protobufjs'
  - '@nestjs/core'
  - core-js-pure
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
